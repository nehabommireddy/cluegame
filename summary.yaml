# Write a short, attention-grabbing description of your project.
desc: >
  Our project is an interactive game inspired by CLUE. Players go through a 
  turn-based system where players can move through rooms of their choice and 
  question suspects and guess what weapons they used.

  The interface supports text-based interaction for making accusations, asking
  questions. You can track discovered information through the displayed clue sheet
  which is printed on every turn. The game ensures each game is randomized by shuffling 
  cards before each iteration.


